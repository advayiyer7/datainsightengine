# Insight Engine configuration.
# Everything here is optional — sensible defaults live in src/insight/config.py.
# Edit thresholds to tune detector sensitivity for your dataset.

# ---------------------------------------------------------------------------
# Tier 0 — schema mapping override (spend-grain dataset: one row per supplier-year).
# The ingest step fuzzy-matches headers to canonical fields; override here if wrong.
# Spend-grain canonical fields: supplier, spend, prev_spend, yoy_change, year.
# (A `spend` mapping switches the engine to spend grain automatically.)
# ---------------------------------------------------------------------------
column_map:
  supplier: supplierName
  spend: totalSpend
  prev_spend: prevYearSpend
  yoy_change: yoyChange          # provided ratio — carried but NOT trusted (noisy)
  year: year
  spend_flag: flagGreaterThan50PercentChange   # provided flag — NOT trusted (~69% TRUE)

# ---------------------------------------------------------------------------
# LLM settings. Key is read from the ANTHROPIC_API_KEY env var — never hardcode.
# ---------------------------------------------------------------------------
llm:
  narrator_model: claude-haiku-4-5       # cheap narrator + judge
  agentic_model: claude-haiku-4-5        # bump to e.g. claude-sonnet-4-6 for harder discovery
  baseline_model: claude-haiku-4-5       # B0 dump-to-LLM baseline
  # Approx USD per million tokens, used only for cost estimates in the report.
  price_per_mtok_input: 1.0
  price_per_mtok_output: 5.0
  max_output_tokens: 4096

# ---------------------------------------------------------------------------
# Tier 2 — narrator selection. The narrator merges findings by subject, ranks
# them, and narrates only the top-N (this is where SYS earns quality over raw
# detectors). The full finding set still lands in findings.json.
# ---------------------------------------------------------------------------
narrator:
  top_n: 8                          # surface only the top-N selected insights
  rank_formula: severity_x_impact   # or "impact" or "severity"
  null_impact_usd: 20000.0          # impact assumed for qualitative (null-impact) findings
  max_per_type: 3                   # cap groups of one detector type so reports stay diverse

# ---------------------------------------------------------------------------
# Tier 1 — detector thresholds.
# ---------------------------------------------------------------------------
# Spend-grain detectors (one row per supplier-year).
detectors:
  supplier_concentration:
    top_n: 10                  # top-N suppliers whose cumulative spend share we report
  tail_spend:
    tail_threshold_usd: 10000.0   # suppliers below this spend are "tail"
    admin_cost_per_supplier: 500.0 # assumed admin overhead carried per supplier
  yoy_spend_movers:
    base_floor: 1000.0         # floor prior spend so tiny denominators don't explode YoY %
    min_abs_change: 10000.0    # only surface movers with at least this dollar change
    top_k: 10                  # top-k risers and top-k fallers
  negative_or_anomalous_spend:
    outlier_k: 3.0             # spend > mean + k*std is a high outlier
    top_negatives: 8
    top_outliers: 8
  new_and_churned_suppliers:
    near_zero: 1.0             # |spend| below this counts as "absent"
    material: 10000.0          # current/prior spend above this counts as "material"

# ---------------------------------------------------------------------------
# Tier 3 — agentic discovery bounds (enforced, non-negotiable).
# ---------------------------------------------------------------------------
agentic:
  max_iterations: 8
  max_wall_clock_seconds: 120
  max_tokens: 60000
  goal: "Find spend patterns or anomalies in this supplier-year data (concentration, tail spend, robust YoY movement, negative/outlier spend, new/churned suppliers) worth more than $50000 that the fixed detectors might miss."

# ---------------------------------------------------------------------------
# Evaluation harness.
# ---------------------------------------------------------------------------
evaluate:
  slices: [0.05, 0.1, 0.25, 0.5, 1.0]   # finer slices => clearer cost-vs-data curve
  baseline_max_rows: 1500    # cap rows fed into B0 dump-to-LLM (context budget); sample beyond this
